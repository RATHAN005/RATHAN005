name: Update profile art

"on":
  schedule:
    - cron: "17 6 * * *"   # ~06:17 UTC daily — avoids the busy :00 minute
  workflow_dispatch: {}    # run manually from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
            requests \
            beautifulsoup4 \
            pillow \
            numpy \
            opencv-python-headless \
            rembg

      - name: Fetch contribution data
        run: python scripts/fetch_contributions.py

      - name: Render heatmap SVG
        run: python scripts/render_heatmap_svg.py

      - name: Render ASCII art SVG
        run: python scripts/make_ascii_svg.py

      - name: Render info card SVG
        run: python scripts/make_info_card.py

      - name: Commit updated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh profile art [skip ci]"
          file_pattern: "data/contributions.json contrib-heatmap.svg rathan-ascii.svg info-card.svg"
